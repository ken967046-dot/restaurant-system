// Get clause text — user-edited value or default
function getClause(key) {
  if (STATE.contractClauses && STATE.contractClauses[key] !== undefined && STATE.contractClauses[key] !== '') {
    return STATE.contractClauses[key];
  }
  return DEFAULT_CLAUSES[key] || '';
}

// Set clause text (user edit)
function setClause(key, value) {
  if (!STATE.contractClauses) STATE.contractClauses = {};
  // If user clears it, store empty string (so getClause returns default if explicitly cleared - actually we want to keep it as '')
  // Actually: if value matches default, remove the key (so getClause falls back to default)
  if (value === DEFAULT_CLAUSES[key]) {
    delete STATE.contractClauses[key];
  } else {
    STATE.contractClauses[key] = value;
  }
  localStorage.setItem('contractClauses', JSON.stringify(STATE.contractClauses));
}

// Reset clause to default
function resetClause(key) {
  if (!STATE.contractClauses) return;
  delete STATE.contractClauses[key];
  localStorage.setItem('contractClauses', JSON.stringify(STATE.contractClauses));
}

// Reset all clauses to defaults
function resetAllClauses() {
  if (!confirm('確定要將所有契約條款還原為預設內容？您所有的編輯都會消失。')) return;
  STATE.contractClauses = {};
  localStorage.removeItem('contractClauses');
  alert('已將所有條款還原為預設內容');
  render();
}

// Replace placeholders in a clause text with actual values
function fillPlaceholders(text, vars) {
  let result = text || '';
  for (const k in vars) {
    const re = new RegExp('\\{\\{' + k + '\\}\\}', 'g');
    const val = vars[k] || '____________';
    // Wrap with bold
    result = result.replace(re, '<strong>' + escapeHTML(val) + '</strong>');
  }
  // Convert newlines to <br>
  result = result.replace(/\n/g, '<br>');
  return result;
}

function escapeHTML(s) {
  return String(s).replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
}

  const v = (id) => {
    const el = document.getElementById(id);
    return el ? (el.value || '____________') : '____________';
  };
  
  // Build placeholder vars

    cEmployer: v('cEmployer'),

// Get/set compliance doc data
function getCompData(docId) {
  return STATE.complianceData[docId] || {};
}
function setCompData(docId, key, value) {
  if (!STATE.complianceData[docId]) STATE.complianceData[docId] = {};
  STATE.complianceData[docId][key] = value;
  localStorage.setItem('complianceData', JSON.stringify(STATE.complianceData));
}
function clearCompData(docId) {
  if (!confirm('確定要清除此文件所有填寫內容？')) return;
  delete STATE.complianceData[docId];
  localStorage.setItem('complianceData', JSON.stringify(STATE.complianceData));
  render();
}

  const dateStr = `${today.getFullYear()}/${String(today.getMonth() + 1).padStart(2, '0')}/${String(today.getDate()).padStart(2, '0')}`;
  
  return `

// Helper for compliance doc inputs
function compInput(docId, key, def = '', isTextarea = false, rows = 3) {
  const data = getCompData(docId);
  const val = (data[key] !== undefined ? data[key] : def);
  const safeVal = String(val).replace(/"/g, '&quot;');
  if (isTextarea) {
    return `<textarea class="comp-textarea" rows="${rows}" 
      oninput="setCompData('${docId}', '${key}', this.value)">${val}</textarea>`;
  }
  return `<input class="comp-input" value="${safeVal}" 
    oninput="setCompData('${docId}', '${key}', this.value)">`;
}

function compCheckbox(docId, key) {
  const data = getCompData(docId);
  const checked = data[key] === true ? 'checked' : '';
  return `<input type="checkbox" class="comp-check" ${checked}
    onchange="setCompData('${docId}', '${key}', this.checked)">`;
}

        { id: 'q4', text: '設備器具定期清潔消毒並紀錄' },
        { id: 'q5', text: '食品接觸面平滑、無凹陷、無裂縫' },
        { id: 'q6', text: '油炸油每日檢查並紀錄，TPM ≤ 25%' },
        { id: 'q7', text: '清潔劑、消毒劑與食品分區儲放，標示清楚' },
      ]
    },
    {
      cat: '肆、食材管理',
      items: [
        { id: 'm1', text: '食材進貨檢查（溫度、外觀、效期）並紀錄' },
        { id: 'm2', text: '食材儲存採先進先出（FIFO）原則' },
        { id: 'm3', text: '食材標示生產日期、效期、入庫日期' },
        { id: 'm4', text: '已開封食品標示開封日期' },
        { id: 'm5', text: '原料、半成品、成品分區儲存' },
        { id: 'm6', text: '食材離地放置（離地 5 公分以上）' },
        { id: 'm7', text: '供應商衛生稽查每月一次並紀錄' },
      ]
    },
    {
      cat: '伍、製程與品質',
      items: [
        { id: 'c1', text: '解凍方式適當（冷藏、流水、微波）不於常溫解凍' },
        { id: 'c2', text: '熱食保溫於 60°C 以上' },
        { id: 'c3', text: '冷食保存於 7°C 以下' },
        { id: 'c4', text: '中心溫度確認（雞肉 75°C、絞肉 71°C、蛋 71°C）' },
        { id: 'c5', text: '剩餘食材冷卻後 2 小時內冷藏' },
        { id: 'c6', text: '食品添加物使用符合規定並紀錄' },
      ]
    },
    {
      cat: '陸、文件紀錄',
      items: [
        { id: 'd1', text: '食品業者登錄字號完成並掛示' },
        { id: 'd2', text: '產品責任險投保證明文件齊全（食安法第 13 條）' },
        { id: 'd3', text: '進貨單、發票保存至少 5 年' },
        { id: 'd4', text: '所有衛生紀錄表單妥善保存' },
        { id: 'd5', text: '從業人員健康檢查證明影本存檔' },
        { id: 'd6', text: '食品過敏原標示完整（菜單上）' },
        { id: 'd7', text: '營業登記、食品業登錄字號公開揭示' },
      ]
    },
  ];
  
  // Calculate score
  const data = getCompData(id);
  let totalItems = 0, passedItems = 0;
  auditItems.forEach(cat => {
    cat.items.forEach(item => {
      totalItems++;
      if (data['audit_' + item.id] === true) passedItems++;
    });
  });
  const score = totalItems > 0 ? Math.round((passedItems / totalItems) * 100) : 0;
  const grade = score >= 90 ? '優' : score >= 75 ? '良' : score >= 60 ? '可' : '需改善';
  const gradeColor = score >= 90 ? '#4A7B59' : score >= 75 ? '#8C7332' : score >= 60 ? '#C8853D' : '#B33E2E';
  
  return `
    <div class="print-head">
      ${STATE.logoData 
        ? `<img src="${STATE.logoData}" class="print-logo" alt="logo">` 
        : `<div class="print-logo-placeholder">YOUR LOGO</div>`}
      <div class="print-head-right">
        <div class="print-eyebrow">HYGIENE SELF-AUDIT CHECKLIST</div>
        <div class="print-title">衛生稽查自評表</div>
        <div class="print-store">${STATE.storeName}</div>
      </div>
    </div>
    
    <div class="comp-section">
      <div class="comp-grid">
        <div class="comp-field">
          <label>稽核日期</label>
          ${compInput(id, 'auditDate', dateStr)}
        </div>
        <div class="comp-field">
          <label>稽核人員</label>
          ${compInput(id, 'auditor')}
        </div>
        <div class="comp-field">
          <label>本月得分</label>
          <div style="font-family: var(--display); font-size: 28px; font-weight: 600; color: ${gradeColor}; padding: 4px 0;">
            ${score} <span style="font-size: 13px; color: #8C7332;">/ 100　·　${grade}</span>
          </div>
        </div>
        <div class="comp-field">
          <label>通過項目</label>
          <div style="font-family: var(--display); font-size: 22px; padding: 8px 0; color: #2A2620;">
            ${passedItems} <span style="font-size: 13px; color: #8C7332;">/ ${totalItems} 項</span>
          </div>
        </div>
      </div>
    </div>
    
    ${auditItems.map(cat => `
      <div class="comp-section">
        <div class="comp-section-title">${cat.cat}</div>
        <table class="comp-table" style="font-size: 12px;">
          <thead>
            <tr>
              <th style="width: 40px;">No.</th>
              <th>檢查項目</th>
              <th style="width: 70px; text-align: center;">符合</th>
              <th style="width: 70px; text-align: center;">不符合</th>
              <th style="width: 200px;">備註 / 改善建議</th>
            </tr>
          </thead>
          <tbody>
            ${cat.items.map((item, i) => {
              const passed = data['audit_' + item.id] === true;
              const failed = data['audit_' + item.id] === false;
              return `
                <tr>
                  <td style="text-align: center; color: #8C7332; font-style: italic;">${String(i + 1).padStart(2, '0')}</td>
                  <td>${item.text}</td>
                  <td style="text-align: center;">
                    <input type="radio" class="comp-radio" name="audit_${item.id}" ${passed ? 'checked' : ''}
                      onchange="setCompData('${id}', 'audit_${item.id}', true)">
                  </td>
                  <td style="text-align: center;">
                    <input type="radio" class="comp-radio" name="audit_${item.id}" ${failed ? 'checked' : ''}
                      onchange="setCompData('${id}', 'audit_${item.id}', false)">
                  </td>
                  <td>${compInput(id, 'note_' + item.id)}</td>
                </tr>
              `;
            }).join('')}
          </tbody>
        </table>
      </div>
    `).join('')}
    
    <div class="comp-section">
      <div class="comp-section-title">柒、整體改善計劃</div>
      <div class="comp-field-block">
        <label>本月主要缺失</label>
        ${compInput(id, 'main_issues', '', true, 3)}
      </div>
      <div class="comp-field-block">
        <label>改善行動方案 (含時程)</label>
        ${compInput(id, 'action_plan', '', true, 3)}
      </div>
      <div class="comp-field-block">
        <label>下月稽核重點</label>
        ${compInput(id, 'next_focus', '', true, 2)}
      </div>
    </div>
    
    <div class="print-foot">
      <div>
        <div class="print-sign-line">${compInput(id, 'sign_auditor')}</div>
        <div class="print-sign-label">稽核人 / Auditor</div>
      </div>
      <div>
        <div class="print-sign-line">${compInput(id, 'sign_chef')}</div>
        <div class="print-sign-label">主廚 / Chef</div>
      </div>
      <div>
        <div class="print-sign-line">${compInput(id, 'sign_manager')}</div>
        <div class="print-sign-label">負責人 / Manager</div>
      </div>
    </div>
    
    <div class="print-footer-note">${STATE.storeName} · 衛生稽查自評表 · 依食品良好衛生規範準則 GHP 製作</div>
  `;
}

// ============================================================
// SETTINGS PAGE
// ============================================================
function renderSettings() {
  return `
    <div class="page-head">
      <div class="page-eyebrow">— Settings</div>
      <h1 class="page-title">店家<em>設定</em></h1>
      <div class="page-divider"></div>
      <p class="page-desc">店名、LOGO 設定。所有變更會立即套用至全部表單與契約書。</p>
    </div>

    <div class="card">
      <div class="card-head">
        <div>
          <div class="card-title">基本資訊</div>
          <div class="card-sub">Store Information</div>
        </div>
      </div>
      <div class="field">
        <label class="field-label">店家名稱</label>
        <input class="field-input" id="setName" value="${STATE.storeName}">
      </div>
      <div class="field">
        <label class="field-label">店家 LOGO</label>
        <div style="display: flex; gap: 16px; align-items: center;">
          <div style="width: 120px; height: 80px; border: 1px dashed var(--border-strong); border-radius: 4px; display: flex; align-items: center; justify-content: center; background: var(--bg-tertiary);">
            ${STATE.logoData 
              ? `<img src="${STATE.logoData}" style="max-width: 100%; max-height: 100%;" alt="logo">` 
              : `<span style="font-size: 10px; color: var(--text-tertiary); letter-spacing: 0.2em;">NO LOGO</span>`}
          </div>
          <div>
            <input type="file" id="setLogo" accept="image/*" style="display:none" onchange="handleLogoUpload(event)">
            <button class="btn" onclick="document.getElementById('setLogo').click()">${STATE.logoData ? '更換 LOGO' : '上傳 LOGO'}</button>
            ${STATE.logoData ? `<button class="btn btn-danger" style="margin-left: 8px;" onclick="removeLogo()">移除 LOGO</button>` : ''}
          </div>
        </div>
      </div>
      <hr class="sep">
      <div class="actions">
        <button class="btn btn-primary" onclick="saveSettings()">儲存設定</button>
      </div>
    </div>

    <div class="card" style="border-left: 2px solid var(--accent);">
      <div class="card-head">
        <div>
          <div class="card-title">店主密碼</div>
          <div class="card-sub">Owner Password — 用於勞動契約書區</div>
        </div>
      </div>
      <p style="font-size: 13px; color: var(--text-secondary); margin-bottom: 16px;">
        ${STATE.ownerPassword 
          ? '已設定店主密碼。進入「勞動契約書」需輸入密碼解鎖，避免員工自行修改契約內容。' 
          : '尚未設定店主密碼。建議設定密碼以保護敏感的契約條款。'}
      </p>
      <div class="actions">
        ${STATE.ownerPassword 
          ? `<button class="btn" onclick="showChangePassword()">修改密碼</button>
             <button class="btn btn-danger" onclick="resetOwnerPassword()">移除密碼保護</button>`
          : `<button class="btn btn-primary" onclick="navigate('contract')">前往設定密碼</button>`}
      </div>
      <div id="changePwArea"></div>
    </div>

    <div class="card" style="border-left: 2px solid #C45A4D;">
      <div class="card-head">
        <div>
          <div class="card-title" style="color: #C45A4D;">資料管理</div>
          <div class="card-sub">Data Management</div>
        </div>
      </div>
      <p style="font-size: 13px; color: var(--text-secondary); margin-bottom: 16px;">所有資料皆儲存於您的瀏覽器本地端 (localStorage)，不上傳至雲端。如需清除所有資料請點擊下方按鈕。</p>
      <div class="actions">
        <button class="btn btn-danger" onclick="clearAll()">清除所有資料</button>
      </div>
    </div>
  `;
}

function showChangePassword() {
  const area = document.getElementById('changePwArea');
  area.innerHTML = `
    <hr class="sep">
    <div class="field">
      <label class="field-label">目前密碼</label>
      <input class="field-input" type="password" id="cpOld">
    </div>
    <div class="field">
      <label class="field-label">新密碼 (至少 4 字元)</label>
      <input class="field-input" type="password" id="cpNew1">
    </div>
    <div class="field">
      <label class="field-label">確認新密碼</label>
      <input class="field-input" type="password" id="cpNew2">
    </div>
    <div class="actions">
      <button class="btn btn-primary" onclick="changePassword()">儲存新密碼</button>
      <button class="btn" onclick="document.getElementById('changePwArea').innerHTML=''">取消</button>
    </div>
  `;
}

function changePassword() {
  const old = document.getElementById('cpOld').value;
  const n1 = document.getElementById('cpNew1').value;
  const n2 = document.getElementById('cpNew2').value;
  if (old !== STATE.ownerPassword) { alert('目前密碼錯誤'); return; }
  if (!n1 || n1.length < 4) { alert('新密碼至少 4 字元'); return; }
  if (n1 !== n2) { alert('兩次輸入的新密碼不相符'); return; }
  STATE.ownerPassword = n1;
  localStorage.setItem('ownerPassword', n1);
  alert('密碼已更新');
  render();
}

function saveSettings() {
  const name = document.getElementById('setName').value.trim();
  if (name) saveString('storeName', name);
  alert('設定已儲存');
  render();
}

function removeLogo() {
  if (!confirm('確定移除 LOGO？')) return;
  STATE.logoData = null;
  localStorage.removeItem('logoData');
  render();
}

function clearAll() {
  if (!confirm('警告：將清除所有資料（廠商、員工、庫存、排班、員工餐、表單、設定、密碼），此動作無法還原。確定繼續？')) return;
  if (!confirm('再次確認：真的要清除所有資料嗎？')) return;
  localStorage.clear();
  Object.assign(STATE, {
    storeName: '私廚 LE PETIT',
    logoData: null,
    vendors: [], inventory: [], employees: [],
    schedule: {}, trainings: [],
    ownerPassword: null, isOwnerUnlocked: false,
    formData: {}, meals: {}, complianceData: {}, contractClauses: {},
    shiftPresets: [
      { id: 'morning', name: '早班', startTime: '09:00', endTime: '15:00', color: '#8FB89B' },
      { id: 'evening', name: '晚班', startTime: '17:00', endTime: '22:00', color: '#6B95C4' },
      { id: 'fullday', name: '全天', startTime: '11:00', endTime: '21:00', color: '#C9A84C' },
      { id: 'closing', name: '收尾班', startTime: '20:00', endTime: '23:00', color: '#9B7BB8' },
      { id: 'rest', name: '休假', startTime: '', endTime: '', color: '#6B665F' },
    ],
    positions: ['主廚', '副主廚', '內場', '外場', '吧台', '收銀'],
    attendance: {}, storeSettings: {},
  });
  render();
}

// ============================================================
// EVENT HANDLERS
// ============================================================
function navigate(page) {
  STATE.currentPage = page;
  STATE.currentForm = null;
  STATE.currentSubPage = null;
  render();
  window.scrollTo(0, 0);
}

function handleLogoUpload(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    STATE.logoData = e.target.result;
    localStorage.setItem('logoData', e.target.result);
    render();
  };
  reader.readAsDataURL(file);
}

function attachEvents() {}

// Initial render
render();
</script>
</body>
</html>
