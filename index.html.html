<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>餐飲業全店管理系統</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;600;700&family=Noto+Sans+TC:wght@300;400;500;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  :root {
    --bg-primary: #0E0E10;
    --bg-secondary: #161618;
    --bg-tertiary: #1F1F22;
    --bg-elevated: #2A2A2E;
    --text-primary: #F5F1E8;
    --text-secondary: #A8A29A;
    --text-tertiary: #6B665F;
    --accent: #C9A84C;
    --accent-dim: #8C7332;
    --accent-bright: #E0BC5C;
    --border: rgba(245, 241, 232, 0.08);
    --border-strong: rgba(245, 241, 232, 0.16);
    --danger: #C45A4D;
    --success: #6B9A7A;
    --warning: #D4A05A;
    --serif: 'Noto Serif TC', 'Cormorant Garamond', serif;
    --display: 'Cormorant Garamond', 'Noto Serif TC', serif;
    --sans: 'Noto Sans TC', 'Inter', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--bg-primary);
    color: var(--text-primary);
    font-family: var(--sans);
    font-weight: 300;
    line-height: 1.6;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  button { font-family: inherit; cursor: pointer; }
  input, select, textarea { font-family: inherit; }

  /* Layout */
  .app { display: flex; min-height: 100vh; }
  .sidebar {
    width: 280px;
    background: var(--bg-secondary);
    border-right: 1px solid var(--border);
    padding: 32px 24px;
    position: sticky;
    top: 0;
    height: 100vh;
    overflow-y: auto;
    flex-shrink: 0;
  }
  .main {
    flex: 1;
    padding: 48px 64px;
    max-width: calc(100vw - 280px);
  }
  .brand {
    font-family: var(--display);
    font-size: 26px;
    font-weight: 500;
    letter-spacing: 0.02em;
    color: var(--accent);
    margin-bottom: 4px;
    font-style: italic;
  }
  .brand-sub {
    font-family: var(--serif);
    font-size: 11px;
    letter-spacing: 0.3em;
    color: var(--text-tertiary);
    text-transform: uppercase;
    margin-bottom: 40px;
  }
  .logo-upload {
    border: 1px dashed var(--border-strong);
    border-radius: 4px;
    padding: 16px;
    text-align: center;
    margin-bottom: 32px;
    cursor: pointer;
    transition: border-color 0.2s;
  }
  .logo-upload:hover { border-color: var(--accent-dim); }
  .logo-upload img { max-width: 100%; max-height: 60px; }
  .logo-upload-text {
    font-size: 11px;
    color: var(--text-tertiary);
    letter-spacing: 0.1em;
  }
  .nav-section {
    font-family: var(--serif);
    font-size: 10px;
    letter-spacing: 0.25em;
    color: var(--text-tertiary);
    text-transform: uppercase;
    margin: 24px 0 12px;
    padding-left: 12px;
  }
  .nav-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 11px 14px;
    border-radius: 4px;
    font-size: 13px;
    color: var(--text-secondary);
    cursor: pointer;
    transition: all 0.2s;
    margin-bottom: 2px;
    letter-spacing: 0.02em;
  }
  .nav-item:hover {
    background: var(--bg-tertiary);
    color: var(--text-primary);
  }
  .nav-item.active {
    background: var(--bg-tertiary);
    color: var(--accent);
    border-left: 2px solid var(--accent);
    padding-left: 12px;
  }
  .nav-item .num {
    font-family: var(--display);
    font-style: italic;
    font-size: 11px;
    color: var(--text-tertiary);
    min-width: 16px;
  }
  .nav-item.active .num { color: var(--accent-dim); }

  /* Page Header */
  .page-head { margin-bottom: 48px; }
  .page-eyebrow {
    font-family: var(--serif);
    font-size: 11px;
    letter-spacing: 0.3em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 12px;
  }
  .page-title {
    font-family: var(--display);
    font-size: 48px;
    font-weight: 500;
    letter-spacing: -0.01em;
    line-height: 1.1;
    margin-bottom: 12px;
  }
  .page-title em {
    font-style: italic;
    color: var(--accent);
    font-weight: 400;
  }
  .page-desc {
    font-size: 14px;
    color: var(--text-secondary);
    max-width: 640px;
    line-height: 1.7;
  }
  .page-divider {
    width: 60px;
    height: 1px;
    background: var(--accent);
    margin: 24px 0;
  }

  /* Card */
  .card {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 32px;
    margin-bottom: 24px;
  }
  .card-head {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 24px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
  }
  .card-title {
    font-family: var(--serif);
    font-size: 20px;
    font-weight: 500;
    letter-spacing: 0.02em;
  }
  .card-sub {
    font-size: 12px;
    color: var(--text-tertiary);
    margin-top: 4px;
    letter-spacing: 0.05em;
  }

  /* Buttons */
  .btn {
    background: transparent;
    border: 1px solid var(--border-strong);
    color: var(--text-primary);
    padding: 10px 20px;
    border-radius: 4px;
    font-size: 12px;
    letter-spacing: 0.1em;
    transition: all 0.2s;
    text-transform: uppercase;
    font-weight: 400;
  }
  .btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }
  .btn-primary {
    background: var(--accent);
    border-color: var(--accent);
    color: var(--bg-primary);
    font-weight: 500;
  }
  .btn-primary:hover {
    background: var(--accent-bright);
    border-color: var(--accent-bright);
    color: var(--bg-primary);
  }
  .btn-sm {
    padding: 6px 12px;
    font-size: 11px;
  }
  .btn-danger {
    color: var(--danger);
    border-color: rgba(196, 90, 77, 0.3);
  }
  .btn-danger:hover {
    background: rgba(196, 90, 77, 0.1);
    border-color: var(--danger);
    color: var(--danger);
  }

  /* Form Elements */
  .field { margin-bottom: 20px; }
  .field-label {
    display: block;
    font-size: 11px;
    letter-spacing: 0.15em;
    color: var(--text-tertiary);
    text-transform: uppercase;
    margin-bottom: 8px;
    font-weight: 500;
  }
  .field-input, .field-select, .field-textarea {
    width: 100%;
    background: var(--bg-tertiary);
    border: 1px solid var(--border);
    color: var(--text-primary);
    padding: 11px 14px;
    border-radius: 4px;
    font-size: 13px;
    transition: border-color 0.2s;
  }
  .field-input:focus, .field-select:focus, .field-textarea:focus {
    outline: none;
    border-color: var(--accent-dim);
  }
  .field-textarea { resize: vertical; min-height: 80px; }

  /* Tables */
  .data-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  .data-table th {
    text-align: left;
    padding: 14px 16px;
    font-size: 10px;
    letter-spacing: 0.15em;
    color: var(--text-tertiary);
    text-transform: uppercase;
    font-weight: 500;
    border-bottom: 1px solid var(--border-strong);
    background: var(--bg-tertiary);
  }
  .data-table td {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    color: var(--text-primary);
  }
  .data-table tr:hover td { background: var(--bg-tertiary); }
  .data-table .num-col {
    font-family: var(--display);
    font-style: italic;
    color: var(--text-tertiary);
    width: 40px;
  }

  /* Form Cards Grid */
  .form-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 16px;
    margin-bottom: 32px;
  }
  .form-card {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 24px;
    cursor: pointer;
    transition: all 0.25s;
    position: relative;
    overflow: hidden;
  }
  .form-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 2px;
    background: var(--accent);
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.3s;
  }
  .form-card:hover { border-color: var(--border-strong); }
  .form-card:hover::before { transform: scaleX(1); }
  .form-card-tag {
    font-family: var(--serif);
    font-size: 10px;
    letter-spacing: 0.25em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 12px;
  }
  .form-card-title {
    font-family: var(--serif);
    font-size: 18px;
    font-weight: 500;
    margin-bottom: 8px;
    letter-spacing: 0.01em;
  }
  .form-card-desc {
    font-size: 12px;
    color: var(--text-secondary);
    line-height: 1.6;
    margin-bottom: 16px;
  }
  .form-card-foot {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-top: 16px;
    border-top: 1px solid var(--border);
    font-size: 11px;
    color: var(--text-tertiary);
    letter-spacing: 0.05em;
  }
  .form-card-arrow {
    color: var(--accent);
    font-family: var(--display);
    font-style: italic;
  }

  /* Tabs */
  .tabs {
    display: flex;
    gap: 0;
    margin-bottom: 32px;
    border-bottom: 1px solid var(--border);
  }
  .tab {
    padding: 14px 24px;
    background: transparent;
    border: none;
    color: var(--text-secondary);
    font-size: 13px;
    letter-spacing: 0.05em;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    transition: all 0.2s;
  }
  .tab:hover { color: var(--text-primary); }
  .tab.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }

  /* Badges */
  .badge {
    display: inline-block;
    font-size: 10px;
    padding: 3px 10px;
    border-radius: 12px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    font-weight: 500;
  }
  .badge-daily { background: rgba(107, 154, 122, 0.15); color: #8FB89B; }
  .badge-weekly { background: rgba(56, 119, 184, 0.15); color: #6B95C4; }
  .badge-monthly { background: rgba(212, 160, 90, 0.15); color: #D4A05A; }
  .badge-gold { background: rgba(201, 168, 76, 0.15); color: var(--accent); }

  /* Print Form (PDF Template) */
  .print-form {
    background: #FFFCF5;
    color: #2A2620;
    padding: 60px 50px;
    margin: 32px 0;
    border-radius: 4px;
    font-family: var(--serif);
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
  }
  .print-head {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    border-bottom: 2px solid #2A2620;
    padding-bottom: 24px;
    margin-bottom: 32px;
  }
  .print-logo {
    max-height: 70px;
    max-width: 180px;
  }
  .print-logo-placeholder {
    width: 100px;
    height: 60px;
    border: 1px dashed #999;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    color: #999;
    font-family: var(--sans);
    letter-spacing: 0.2em;
  }
  .print-head-right { text-align: right; }
  .print-eyebrow {
    font-size: 10px;
    letter-spacing: 0.4em;
    color: #8C7332;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .print-title {
    font-family: var(--display);
    font-size: 36px;
    font-weight: 500;
    color: #2A2620;
    letter-spacing: -0.01em;
    line-height: 1.1;
  }
  .print-store {
    font-size: 12px;
    color: #5C544A;
    margin-top: 4px;
    letter-spacing: 0.1em;
  }
  .print-meta {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 24px;
    margin-bottom: 32px;
    padding: 16px 0;
    border-bottom: 1px solid #D4C8B0;
  }
  .print-meta-item .label {
    font-size: 10px;
    letter-spacing: 0.2em;
    color: #8C7332;
    text-transform: uppercase;
    margin-bottom: 4px;
    font-family: var(--sans);
    font-weight: 500;
  }
  .print-meta-item .value {
    font-size: 14px;
    color: #2A2620;
    border-bottom: 1px solid #2A2620;
    padding-bottom: 2px;
    min-height: 22px;
  }
  .print-table {
    width: 100%;
    border-collapse: collapse;
    margin-bottom: 24px;
  }
  .print-table th {
    background: #F0E8D4;
    padding: 12px 10px;
    font-size: 11px;
    color: #2A2620;
    border: 1px solid #2A2620;
    font-weight: 600;
    letter-spacing: 0.05em;
  }
  .print-table td {
    padding: 14px 10px;
    border: 1px solid #5C544A;
    font-size: 13px;
    height: 36px;
  }
  .print-foot {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 32px;
    margin-top: 40px;
    padding-top: 24px;
    border-top: 1px solid #D4C8B0;
  }
  .print-sign-line {
    border-bottom: 1px solid #2A2620;
    height: 36px;
    margin-bottom: 8px;
  }
  .print-sign-label {
    font-size: 11px;
    letter-spacing: 0.2em;
    color: #8C7332;
    text-transform: uppercase;
    text-align: center;
    font-family: var(--sans);
    font-weight: 500;
  }
  .print-footer-note {
    text-align: center;
    margin-top: 32px;
    padding-top: 16px;
    border-top: 1px solid #D4C8B0;
    font-size: 10px;
    color: #8C7332;
    font-family: var(--sans);
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }
  /* Editable cells inside print form */
  .print-form input.cell, .print-form input.meta-input {
    width: 100%;
    border: none;
    background: transparent;
    color: #2A2620;
    font-family: var(--serif);
    font-size: 13px;
    padding: 0;
    outline: none;
    text-align: left;
  }
  .print-form input.cell:focus {
    background: #FFF8E1;
    box-shadow: inset 0 0 0 1px #C9A84C;
  }
  .print-form input.meta-input {
    font-size: 14px;
    color: #2A2620;
  }
  .print-form input.meta-input:focus {
    background: #FFF8E1;
  }
  .print-form td.editable {
    padding: 0;
  }
  .print-form td.editable input.cell {
    padding: 14px 10px;
    height: 100%;
  }
  .print-form .print-sign-line input {
    width: 100%;
    height: 100%;
    border: none;
    background: transparent;
    text-align: center;
    font-family: var(--serif);
    font-size: 14px;
    color: #2A2620;
    outline: none;
  }
  .print-form .print-sign-line input:focus {
    background: #FFF8E1;
  }
  /* For PDF rendering — input values must show up. html2canvas reads .value attr poorly,
     so we use a CSS trick to show the value via a span overlay during export. */
  .editing-toolbar {
    background: var(--bg-tertiary);
    border-radius: 4px;
    padding: 12px 16px;
    margin-bottom: 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 12px;
  }
  .editing-toolbar-info {
    color: var(--text-secondary);
  }
  .editing-toolbar-info strong {
    color: var(--accent);
  }

  /* Modal */
  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 1000;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 32px;
    overflow-y: auto;
  }
  .modal {
    background: var(--bg-secondary);
    border: 1px solid var(--border-strong);
    border-radius: 6px;
    width: 100%;
    max-width: 1000px;
    max-height: 95vh;
    overflow-y: auto;
    padding: 0;
  }
  .modal-head {
    padding: 24px 32px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: sticky;
    top: 0;
    background: var(--bg-secondary);
    z-index: 10;
  }
  .modal-body { padding: 24px 32px 32px; }
  .modal-close {
    background: transparent;
    border: none;
    color: var(--text-secondary);
    font-size: 24px;
    cursor: pointer;
  }

  /* Stats */
  .stat-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 16px;
    margin-bottom: 32px;
  }
  .stat {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    padding: 24px;
    border-radius: 6px;
  }
  .stat-label {
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--text-tertiary);
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .stat-value {
    font-family: var(--display);
    font-size: 36px;
    font-weight: 500;
    color: var(--accent);
    line-height: 1;
  }
  .stat-meta {
    font-size: 11px;
    color: var(--text-secondary);
    margin-top: 6px;
  }

  /* Empty state */
  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-tertiary);
  }
  .empty-title {
    font-family: var(--serif);
    font-size: 18px;
    margin-bottom: 8px;
    color: var(--text-secondary);
  }
  .empty-desc { font-size: 12px; }

  /* Schedule Calendar */
  .schedule-grid {
    display: grid;
    grid-template-columns: 100px repeat(7, 1fr);
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
    font-size: 12px;
  }
  .schedule-cell {
    background: var(--bg-secondary);
    padding: 10px 8px;
    min-height: 50px;
  }
  .schedule-head {
    background: var(--bg-tertiary);
    padding: 12px 8px;
    text-align: center;
    font-size: 11px;
    color: var(--text-tertiary);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .schedule-name {
    background: var(--bg-tertiary);
    padding: 12px 10px;
    font-size: 12px;
    color: var(--text-primary);
  }
  .shift-tag {
    background: rgba(201, 168, 76, 0.15);
    color: var(--accent);
    padding: 3px 6px;
    border-radius: 3px;
    font-size: 10px;
    display: inline-block;
    margin: 2px 0;
    cursor: pointer;
  }

  /* Aibou-Style Schedule Grid */
  .schedule-grid-aibou {
    display: grid;
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
    min-width: 100%;
  }
  .sg-head {
    background: var(--bg-tertiary);
    padding: 12px 8px;
    text-align: center;
    font-size: 11px;
    color: var(--text-secondary);
    letter-spacing: 0.05em;
    font-weight: 500;
  }
  .sg-head.weekend {
    color: var(--accent);
  }
  .sg-name-head {
    text-align: left;
    padding-left: 14px;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    font-size: 10px;
    color: var(--text-tertiary);
  }
  .sg-name {
    background: var(--bg-tertiary);
    padding: 16px 14px;
    border-right: 2px solid var(--border-strong);
  }
  .sg-cell {
    background: var(--bg-secondary);
    padding: 14px 8px;
    cursor: pointer;
    min-height: 76px;
    transition: background 0.15s;
    text-align: center;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  .sg-cell:hover {
    background: var(--bg-tertiary);
  }
  .sg-cell:empty {
    background: var(--bg-secondary);
  }

  /* Meals page */
  .meals-table th, .meals-table td {
    border: 1px solid var(--border);
    text-align: center;
  }
  .meals-table th {
    padding: 10px 6px;
    font-size: 11px;
    color: var(--text-secondary);
    font-weight: 500;
  }
  .meal-cell {
    padding: 12px 6px;
    cursor: pointer;
    transition: all 0.15s;
    font-size: 12px;
    color: var(--text-primary);
    font-weight: 500;
    min-height: 44px;
  }
  .meal-cell:hover {
    transform: scale(1.05);
    box-shadow: inset 0 0 0 1px var(--accent);
  }
  .meal-option {
    display: flex;
    align-items: center;
    gap: 16px;

// ============================================================
// Utilities
// ============================================================
// ============================================================
// PDF Download — Unified, Robust Version
// ============================================================
// Strategy:
// 1. Take a snapshot of the element while preserving input values via temporary spans
// 2. Wait for images/fonts to load
// 3. Render with html2canvas (mobile-aware scale, white BG)
// 4. Slice canvas into A4 pages and add to jsPDF
// 5. iOS Safari: use Blob URL with fallback to new tab/share
// 6. Always restore the DOM, even on errors

function _isIOS() {
  return /iPad|iPhone|iPod/.test(navigator.userAgent) || 
         (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
}
function _isMobile() {
  return /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
}

async function _generatePDFFromElement(element, filename, btn) {
  if (!element) {
    alert('找不到要下載的內容');
    return;
  }
  if (typeof html2canvas === 'undefined' || typeof window.jspdf === 'undefined') {
    alert('PDF 套件尚未載入完成，請等網路載入後再試（約 3-5 秒）');
    return;
  }
  
  const originalText = btn ? btn.textContent : '';
  if (btn) {
    btn.textContent = '產生中…';
    btn.disabled = true;
  }
  
  // Snapshot all inputs & textareas → swap with spans for clean rendering
  const replacements = [];
  const allInputs = element.querySelectorAll('input, textarea');
  allInputs.forEach(input => {
    const isCheckbox = input.type === 'checkbox';
    const isRadio = input.type === 'radio';
    const span = document.createElement('span');
    
    if (isCheckbox || isRadio) {
      span.textContent = input.checked ? (isCheckbox ? '☑' : '●') : '☐';
      span.style.fontSize = '16px';
      span.style.color = input.checked ? '#2A2620' : '#999';
      span.style.fontFamily = 'sans-serif';
    } else {
      span.textContent = input.value || '';
      const cs = window.getComputedStyle(input);
      span.style.cssText = `
        display: inline-block;
        width: ${input.offsetWidth || 100}px;
        min-height: ${input.offsetHeight || 20}px;
        padding: ${cs.padding};
        font-family: 'Noto Serif TC', serif;
        font-size: ${cs.fontSize};
        line-height: ${cs.lineHeight};
        color: #2A2620;
        background: transparent;
        white-space: pre-wrap;
        word-wrap: break-word;
        text-align: ${cs.textAlign};
        vertical-align: middle;
      `;
    }
    
    input.parentNode.insertBefore(span, input);
    input.style.display = 'none';
    replacements.push({ input, span });
  });
  
  // Wait for layout to settle
  await new Promise(r => setTimeout(r, 250));
  
  // Wait for fonts (with timeout to avoid hang on iOS)
  if (document.fonts && document.fonts.ready) {
    try {
      await Promise.race([
        document.fonts.ready,
        new Promise(r => setTimeout(r, 2000)) // 2s timeout
      ]);
    } catch (e) { /* ignore */ }
  }
  
  // Restore function (called on success or error)
  const restore = () => {
    replacements.forEach(({ input, span }) => {
      try {
        input.style.display = '';
        if (span.parentNode) span.remove();
      } catch (e) { /* ignore */ }
    });
  };
  
  try {
    // Mobile uses lower scale to avoid memory crashes
    const scale = _isMobile() ? 1.5 : 2;
    
    const canvas = await html2canvas(element, {
      scale: scale,
      backgroundColor: '#FFFCF5',
      useCORS: true,
      logging: false,
      letterRendering: true,
      allowTaint: true,
      imageTimeout: 15000,
      // Don't override window dimensions - let html2canvas figure it out
    });
    
    // Restore DOM as soon as canvas is captured
    restore();
    
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF({
      orientation: 'portrait',
      unit: 'mm',
      format: 'a4',
      compress: true,
    });
    
    const pdfWidth = pdf.internal.pageSize.getWidth();   // 210mm
    const pdfHeight = pdf.internal.pageSize.getHeight(); // 297mm
    
    const imgWidth = pdfWidth;
    const imgHeight = (canvas.height * imgWidth) / canvas.width;
    
    let heightLeft = imgHeight;
    let position = 0;
    const imgData = canvas.toDataURL('image/jpeg', 0.88);
    
    pdf.addImage(imgData, 'JPEG', 0, position, imgWidth, imgHeight);
    heightLeft -= pdfHeight;
    
    while (heightLeft > 0) {
      position -= pdfHeight;
      pdf.addPage();
      pdf.addImage(imgData, 'JPEG', 0, position, imgWidth, imgHeight);
      heightLeft -= pdfHeight;
    }
    
    // ====== Mobile-friendly download ======
    if (_isMobile() || _isIOS()) {
      // On mobile: use Blob URL + window.open fallback
      try {
        const blob = pdf.output('blob');
        const url = URL.createObjectURL(blob);
        
        // Try multiple methods in order:
        // 1. Create a styled link and click it
        const link = document.createElement('a');
        link.href = url;
        link.download = filename;
        link.target = '_blank';
        link.rel = 'noopener';
        document.body.appendChild(link);
        link.click();
        
        // 2. Show the share modal as fallback after a moment
        setTimeout(() => {
          document.body.removeChild(link);
          // Show user-friendly modal with link
          showMobilePDFModal(url, filename);
        }, 500);
      } catch (e) {
        console.error('Mobile PDF blob error:', e);
        // Last resort: try standard save
        pdf.save(filename);
      }
    } else {
      // Desktop: standard save works fine
      pdf.save(filename);
    }
    
    if (btn) { btn.textContent = originalText; btn.disabled = false; }
  } catch (err) {
    console.error('PDF generation error:', err);
    restore();
    alert('PDF 產生失敗：' + (err.message || '未知錯誤') + '\n\n建議：\n1. 重新整理頁面再試\n2. 換用 Chrome 瀏覽器\n3. 表單內容過多時請分次處理');
    if (btn) { btn.textContent = originalText; btn.disabled = false; }
  }
}

function downloadPDF(elementId, filename, ev) {
  const element = document.getElementById(elementId);
  const btn = ev && ev.target && ev.target.tagName === 'BUTTON' 
    ? ev.target 
    : (window.event && window.event.target && window.event.target.tagName === 'BUTTON' 
       ? window.event.target 
       : document.activeElement);
  _generatePDFFromElement(element, filename, btn);
}

       ? window.event.target 
       : document.activeElement);

}

// Get/set form data for a specific form
function getFormData(formId) {
  return STATE.formData[formId] || { meta: {}, rows: {}, signs: {} };
}
function updateFormCell(formId, key, value) {
  if (!STATE.formData[formId]) STATE.formData[formId] = { meta: {}, rows: {}, signs: {} };
  // key format: "meta.year" or "rows.0.2" or "signs.recorder"
  const parts = key.split('.');
  let target = STATE.formData[formId];
  for (let i = 0; i < parts.length - 1; i++) {
    if (!target[parts[i]]) target[parts[i]] = {};
    target = target[parts[i]];
  }
  target[parts[parts.length - 1]] = value;
  localStorage.setItem('formData', JSON.stringify(STATE.formData));
  
  // Live update for staff meal summary
  if (formId === 'staff_meal' && key.startsWith('rows.')) {
    refreshStaffMealSummary(formId);
  }
}

// Refresh just the staff meal summary block without re-rendering the whole modal
function refreshStaffMealSummary(formId) {
  const data = getFormData(formId);
  const newHtml = renderStaffMealSummary(formId, data.rows || {});
  const wrapper = document.getElementById('staffMealSummary');
  if (wrapper) wrapper.innerHTML = newHtml;
}
// Clear all data for a form
function clearFormData(formId) {
  if (!confirm('確定要清除此表單所有填寫內容？')) return;
  delete STATE.formData[formId];
  localStorage.setItem('formData', JSON.stringify(STATE.formData));
  render();
}

function renderFormModal() {
  const f = FORMS.find(x => x.id === STATE.currentForm);
  if (!f) return '';
  
  const printId = 'print-' + f.id;
  const today = new Date();
  const month = today.getMonth() + 1;
  const year = today.getFullYear();
  
  const data = getFormData(f.id);
  const meta = data.meta || {};
  const rows = data.rows || {};
  const signs = data.signs || {};
  
  // Helpers for inputs
  const metaInput = (k, def = '') => `<input class="meta-input" 
    value="${(meta[k] !== undefined ? meta[k] : def).replace(/"/g, '&quot;')}" 
    oninput="updateFormCell('${f.id}', 'meta.${k}', this.value)">`;
  
  const cellInput = (rowIdx, colIdx) => {
    const key = `${rowIdx}_${colIdx}`;
    const value = rows[key] || '';
    return `<input class="cell" value="${value.replace(/"/g, '&quot;')}" 
      oninput="updateFormCell('${f.id}', 'rows.${key}', this.value)">`;
  };
  
  const signInput = (k) => `<input value="${(signs[k] || '').replace(/"/g, '&quot;')}" 
    oninput="updateFormCell('${f.id}', 'signs.${k}', this.value)">`;
  
  return `
    <div class="modal-backdrop" onclick="if(event.target===this) closeForm()">

            <strong style="color: var(--accent); font-size: 11px; letter-spacing: 0.1em;">— 法規依據</strong><br>${f.note}

              ${STATE.logoData

// Render staff meal monthly summary block
function renderStaffMealSummary(formId, rows) {
  // Aggregate by staff name. Columns are:
  // 0=日期 1=員工姓名 2=餐點品名 3=成本(元) 4=未食用領現金 5=加點扣款(原價6折) 6=備註 7=簽名
  const summary = {};
  // Iterate all rows (max 31 in form)
  for (let i = 0; i < 31; i++) {
    const name = (rows[`${i}_1`] || '').trim();
    if (!name) continue;
    const cost = parseFloat(rows[`${i}_3`]) || 0;
    const cash = parseFloat(rows[`${i}_4`]) || 0;
    const extra = parseFloat(rows[`${i}_5`]) || 0;
    if (!summary[name]) {
      summary[name] = { mealCount: 0, mealCost: 0, cashCount: 0, cashTotal: 0, extraTotal: 0 };
    }
    if (cost > 0) {
      summary[name].mealCount += 1;
      summary[name].mealCost += cost;
    }
    if (cash > 0) {
      summary[name].cashCount += 1;
      summary[name].cashTotal += cash;
    }
    if (extra > 0) {
      summary[name].extraTotal += extra;
    }
  }
  
  const names = Object.keys(summary);
  if (names.length === 0) {
    return `
      <div style="margin-top: 24px; padding: 16px; background: #FAF6EB; border: 1px dashed #C9A84C; border-radius: 4px; text-align: center; font-size: 12px; color: #8C7332;">
        填寫上方記錄表後，此處將自動產出月度結算
      </div>
    `;
  }
  
  return `
    <div style="margin-top: 32px; padding-top: 24px; border-top: 2px dashed #8C7332;">
      <div style="text-align: center; margin-bottom: 16px;">
        <div style="font-size: 10px; letter-spacing: 0.4em; color: #8C7332; text-transform: uppercase; margin-bottom: 4px;">— Monthly Settlement —</div>
        <div style="font-family: var(--display); font-size: 22px; font-weight: 500; color: #2A2620;">月 度 結 算</div>
      </div>
      
      <table class="print-table" style="font-size: 12px;">
        <thead>
          <tr>
            <th style="width: 40px;">No.</th>
            <th>員工姓名</th>
            <th style="width: 90px;">食用員工餐</th>
            <th style="width: 90px;">餐點成本合計</th>
            <th style="width: 90px;">未食用次數</th>
            <th style="width: 100px;">應發伙食費</th>
            <th style="width: 100px;">加點扣款合計</th>
            <th style="width: 100px;">薪資加減合計</th>
          </tr>
        </thead>
        <tbody>
          ${names.map((name, idx) => {
            const s = summary[name];
            const netAdjust = s.cashTotal - s.extraTotal; // 應發 - 應扣
            const netLabel = netAdjust > 0 ? `+ NT$ ${netAdjust.toLocaleString()}` 
                          : netAdjust < 0 ? `- NT$ ${Math.abs(netAdjust).toLocaleString()}`
                          : 'NT$ 0';
            const netColor = netAdjust > 0 ? '#0F6E56' : netAdjust < 0 ? '#993C1D' : '#5C544A';
            return `

// HR MODULE — Aibou Crew Style
// 統一管理：員工資料、班別、排班、薪資結算
// ============================================================

// === Helper functions ===
function shiftDuration(presetId) {
  const preset = STATE.shiftPresets.find(p => p.id === presetId);
  if (!preset || !preset.startTime || !preset.endTime) return 0;
  const [sh, sm] = preset.startTime.split(':').map(Number);
  const [eh, em] = preset.endTime.split(':').map(Number);
  let mins = (eh * 60 + em) - (sh * 60 + sm);
  if (mins < 0) mins += 24 * 60; // crosses midnight
  // Subtract 1hr break for shifts > 6 hours (按勞基法第 35 條)
  const hours = mins / 60;
  return hours > 6 ? hours - 1 : hours;
}

function getMonthKey(date) {
  const d = date || new Date();
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
}

function getDayKey(monthKey, day) {
  return `${monthKey}-${String(day).padStart(2, '0')}`;
}

function calcMonthHours(monthKey, empId) {
  let total = 0;          // 一般工時
  let holidayHours = 0;   // 國定假日工時（要加倍）
  let workDays = 0;
  let consecutive = 0;
  let maxConsecutive = 0;
  let prevHasShift = false;
  
  const [yr, mo] = monthKey.split('-').map(Number);
  const daysInMonth = new Date(yr, mo, 0).getDate();
  
  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = getDayKey(monthKey, d);
    const key = dateStr + '-' + empId;
    const shift = STATE.schedule[key];
    
    // Check leave for this day
    const onLeave = STATE.leaves.find(l => 
      l.empId === empId && 
      dateStr >= l.startDate && 
      dateStr <= l.endDate &&
      l.status === 'approved'
    );
    
    if (shift && shift !== 'rest' && !onLeave) {
      const h = shiftDuration(shift);
      if (h > 0) {
        if (isHoliday(dateStr)) {
          holidayHours += h; // 國定假日上班 — 工資加倍
        } else {
          total += h;
        }
        workDays++;
        if (prevHasShift) consecutive++;
        else consecutive = 1;
        maxConsecutive = Math.max(maxConsecutive, consecutive);
        prevHasShift = true;
      } else {
        prevHasShift = false;
      }
    } else {
      prevHasShift = false;
      consecutive = 0;
    }
  }
  return { total, holidayHours, workDays, maxConsecutive };
}

// 投保級距 (依 2025 年勞動部公告，簡化版本)
const INSURANCE_TIERS = [
  28590, 30300, 31800, 33300, 34800, 36300, 38200, 40100, 42000, 43900, 45800
];

function findInsuranceTier(salary) {
  if (salary <= INSURANCE_TIERS[0]) return INSURANCE_TIERS[0];
  for (const t of INSURANCE_TIERS) if (salary <= t) return t;
  return INSURANCE_TIERS[INSURANCE_TIERS.length - 1];
}

// 變形工時模式之每月工時上限
function getMonthlyHourLimit() {
  const mode = STATE.storeSettings.workHourMode || 'standard';
  // standard: 174 hr/月（每週 40 hr）
  // biweekly: 兩週彈性 84 hr → 仍維持每月 174 hr 概念，但容許單週超過 40
  // fourweek: 四週彈性，連續四週 168 hr，月平均 174
  // 此處簡化為都用 174 hr 作為加班分界
  return 174;
}

// 計算單一員工本月完整薪資結算
function calcMonthlyPayroll(emp, monthKey) {
  const hours = calcMonthHours(monthKey, emp.id);
  const sal = parseFloat(emp.salary) || 0;
  const salaryType = emp.salaryType || '月薪';
  const totalWorkedHours = hours.total + hours.holidayHours;
  
  // 1. 基本薪資
  let baseSalary = 0;
  if (salaryType === '時薪') {
    baseSalary = Math.round(sal * hours.total); // 時薪不含國定假日（國定假日另算 2 倍）
  } else if (salaryType === '日薪') {
    baseSalary = Math.round(sal * hours.workDays);
  } else {
    baseSalary = sal; // 月薪固定
  }
  
  // 2. 國定假日加倍工資（依勞基法第 39 條，國定假日工作工資加倍發給）
  // 月薪制：國定假日工作 1 天 = 多發 1 日工資（已含原本月薪內，再加 1 日）
  // 時薪/日薪：國定假日工資 = 原工資 × 2
  let holidayPay = 0;
  if (salaryType === '月薪') {
    // 月薪制：國定假日已含原本月薪 → 出勤需「再加發 1 日工資」
    const dailyWage = sal / 30; // 月薪 / 30 日推估日薪
    const holidayDays = Math.ceil(hours.holidayHours / 8); // 國定假日工作日數（每 8 小時算 1 日）
    holidayPay = Math.round(dailyWage * holidayDays);
  } else if (salaryType === '時薪') {
    // 時薪：國定假日工作工資加倍 → 額外加發等同正常工資（即 1 倍時薪 × 國定假日時數）
    holidayPay = Math.round(sal * hours.holidayHours);
  } else if (salaryType === '日薪') {
    const holidayDays = Math.ceil(hours.holidayHours / 8);
    holidayPay = Math.round(sal * holidayDays);
  }
  
  // 3. 加班費（一般日加班）
  const monthlyLimit = getMonthlyHourLimit();
  let overtime = 0;
  let overtimeHours = 0;
  if (salaryType === '月薪' && totalWorkedHours > monthlyLimit) {
    overtimeHours = totalWorkedHours - monthlyLimit;
    const hourlyRate = sal / monthlyLimit;
    if (overtimeHours <= 46) { // 月加班上限 46 小時
      const firstTier = Math.min(overtimeHours, 8);
      const restTier = Math.max(0, overtimeHours - 8);
      overtime = Math.round(hourlyRate * 1.34 * firstTier + hourlyRate * 1.67 * restTier);
    } else {
      overtime = Math.round(hourlyRate * 1.34 * 8 + hourlyRate * 1.67 * 38); // 達上限
    }
  }
  
  // 4. 員工餐結算（從 STATE.meals 取）
  let mealCash = 0, mealAddon = 0;
  const mealData = STATE.meals[monthKey] || {};
  Object.keys(mealData).forEach(k => {
    const [, eid] = k.split('_');
    if (eid !== emp.id) return;
    const rec = mealData[k];
    if (rec.type === 'cash') mealCash += 100;
    else if (rec.type === 'addon') mealAddon += Math.round(rec.extra * 0.6);
  });
  
  // 5. 勞健保（按投保級距計算）
  const tier = findInsuranceTier(baseSalary || sal);
  const laborInsurance = Math.round(tier * 0.12 * 0.2); // 員工負擔 20%
  const healthInsurance = Math.round(tier * 0.0517 * 0.3); // 員工負擔 30%（不含眷屬）
  
  // 6. 請假扣款（依勞基法 + 勞工請假規則）
  // 病假：一年內 30 日以內半薪 (扣 50%)，超過 30 日為無薪 (全扣)
  // 事假：一年內 14 日，全部無薪 (全扣)
  // 特休、婚喪、公傷、產假、陪產假：全薪 (不扣)
  // 生理假：每月 1 日全薪不計入病假；超過 1 日併入病假計算
  
  let leaveDeduction = 0;
  let leaveSummary = { paid: 0, halfPaid: 0, unpaid: 0 };
  
  // 先計算本年度（年初到月底）已用病假天數，用於判斷 30 日上限
  const yearStart = monthKey.slice(0, 4) + '-01-01';
  const monthEnd = (() => {
    const [yr, mo] = monthKey.split('-').map(Number);
    const last = new Date(yr, mo, 0).getDate();
    return `${monthKey}-${String(last).padStart(2,'0')}`;
  })();
  
  // 本年度截至本月已使用病假天數（不含當月）
  const sickUsedBeforeMonth = STATE.leaves
    .filter(l => l.empId === emp.id && l.status === 'approved' 
              && l.type === '病假'
              && l.startDate >= yearStart
              && l.endDate < monthKey + '-01')
    .reduce((sum, l) => sum + (parseFloat(l.days) || 0), 0);
  
  let sickAccumulated = sickUsedBeforeMonth;
  
  STATE.leaves.forEach(l => {
    if (l.empId !== emp.id || l.status !== 'approved') return;
    const startInMonth = l.startDate.startsWith(monthKey);
    const endInMonth = l.endDate.startsWith(monthKey);
    if (!startInMonth && !endInMonth) return;
    
    const days = parseFloat(l.days) || 1;
    const dailyWage = salaryType === '月薪' ? sal / 30 
                    : salaryType === '時薪' ? sal * 8 
                    : sal;
    
    if (l.type === '事假') {
      // 事假全額無薪
      leaveDeduction += Math.round(dailyWage * days);
      leaveSummary.unpaid += days;
    } else if (l.type === '病假') {
      // 病假：30 日以內半薪 (扣 50%)，超過為無薪 (全扣)
      const SICK_CAP = 30;
      const remainingHalfPaid = Math.max(0, SICK_CAP - sickAccumulated);
      const halfPaidDays = Math.min(days, remainingHalfPaid);
      const unpaidDays = days - halfPaidDays;
      
      leaveDeduction += Math.round(dailyWage * halfPaidDays * 0.5);
      leaveDeduction += Math.round(dailyWage * unpaidDays);
      leaveSummary.halfPaid += halfPaidDays;
      leaveSummary.unpaid += unpaidDays;
      sickAccumulated += days;
    } else if (l.type === '生理假') {
      // 生理假：每月 1 日全薪；超過 1 日併入病假計
      const freeDays = Math.min(1, days);
      const sickEquivDays = days - freeDays;
      leaveSummary.paid += freeDays;
      
      if (sickEquivDays > 0) {
        const SICK_CAP = 30;
        const remainingHalfPaid = Math.max(0, SICK_CAP - sickAccumulated);
        const halfPaidDays = Math.min(sickEquivDays, remainingHalfPaid);
        const unpaidDays = sickEquivDays - halfPaidDays;
        
        leaveDeduction += Math.round(dailyWage * halfPaidDays * 0.5);
        leaveDeduction += Math.round(dailyWage * unpaidDays);
        leaveSummary.halfPaid += halfPaidDays;
        leaveSummary.unpaid += unpaidDays;
        sickAccumulated += sickEquivDays;
      }
    } else {
      // 特休、婚喪假、公傷假、產假、陪產假 — 全薪不扣
      leaveSummary.paid += days;
    }
  });
  
  // 7. 應領總額
  const grossPay = baseSalary + holidayPay + overtime + mealCash;
  const deductions = laborInsurance + healthInsurance + mealAddon + leaveDeduction;
  const netPay = grossPay - deductions;
  
  return {
    hours,
    salaryType, baseRate: sal,
    baseSalary, holidayPay, overtime, overtimeHours,
    mealCash, mealAddon,
    laborInsurance, healthInsurance, tier,
    leaveDeduction, leaveSummary,
    grossPay, deductions, netPay,
  };
}

// HR DASHBOARD — 人事總覽
// ============================================================
function renderHrDashboard() {
  const monthKey = getMonthKey();
  const employees = STATE.employees.filter(e => e.status === '在職');
  
  // 整體統計
  let totalGross = 0, totalNet = 0, totalHours = 0, totalWorkDays = 0;
  let warningEmps = []; // 連續上班過多的人
  
  employees.forEach(emp => {
    const p = calcMonthlyPayroll(emp, monthKey);
    totalGross += p.grossPay;
    totalNet += p.netPay;
    totalHours += p.hours.total;
    totalWorkDays += p.hours.workDays;
    if (p.hours.maxConsecutive > 6) {
      warningEmps.push({ name: emp.name, days: p.hours.maxConsecutive });
    }
  });
  
  // 健康證快過期
  const today = new Date();
  const healthAlerts = employees.filter(e => {
    if (!e.healthExp) return false;
    const exp = new Date(e.healthExp);
    const diff = Math.ceil((exp - today) / (1000 * 60 * 60 * 24));
    return diff <= 30;
  });
  
  // 人力成本佔比
  const targetRevenue = parseFloat(STATE.storeSettings.monthlyRevenue) || 0;
  const costRatio = targetRevenue > 0 ? (totalGross / targetRevenue * 100) : 0;
  const costTarget = parseFloat(STATE.storeSettings.costTarget) || 30;
  const costStatus = costRatio === 0 ? 'normal' : costRatio > costTarget ? 'over' : 'normal';
  
  return `
    <div class="page-head">
      <div class="page-eyebrow">— HR Dashboard</div>
      <h1 class="page-title">人事<em>總覽</em></h1>
      <div class="page-divider"></div>
      <p class="page-desc">${getMonthKey().replace('-', ' 年 ')} 月即時人力數據。所有資料由排班、員工餐統計自動匯入計算，無需手動輸入。</p>
    </div>
    
    <div class="stat-grid">
      <div class="stat">
        <div class="stat-label">在職員工</div>
        <div class="stat-value">${employees.length}</div>
        <div class="stat-meta">合計人數</div>
      </div>
      <div class="stat">
        <div class="stat-label">本月總工時</div>
        <div class="stat-value">${Math.round(totalHours)}</div>
        <div class="stat-meta">小時 · ${totalWorkDays} 工作日次</div>
      </div>
      <div class="stat">
        <div class="stat-label">本月薪資支出</div>
        <div class="stat-value" style="font-size: 28px;">NT$<br>${totalGross.toLocaleString()}</div>
        <div class="stat-meta">應發毛薪 (含加班/伙食)</div>
      </div>
      <div class="stat" style="${costStatus === 'over' ? 'border-left: 3px solid #C45A4D;' : ''}">
        <div class="stat-label">人事成本佔比</div>
        <div class="stat-value" style="color: ${costStatus === 'over' ? '#C45A4D' : 'var(--accent)'};">
          ${targetRevenue > 0 ? costRatio.toFixed(1) + '%' : '—'}
        </div>
        <div class="stat-meta">${targetRevenue > 0 ? `目標 ≤ ${costTarget}%` : '請設定目標營收'}</div>
      </div>
    </div>
    
    ${warningEmps.length > 0 ? `
      <div class="card" style="border-left: 3px solid #C45A4D;">
        <div style="font-size: 11px; color: #C45A4D; letter-spacing: 0.15em; margin-bottom: 8px; font-weight: 500;">⚠ 勞基法警示</div>
        <div style="font-size: 13px; color: var(--text-secondary); line-height: 1.7;">
          以下員工連續工作超過 6 天，依勞基法第 36 條每 7 日應有 1 日例假，請調整排班：<br>
          ${warningEmps.map(w => `<strong style="color: var(--text-primary);">${w.name}</strong>（連續 ${w.days} 天）`).join('　·　')}
        </div>
      </div>
    ` : ''}
    
    ${healthAlerts.length > 0 ? `
      <div class="card" style="border-left: 3px solid #D4A05A;">
        <div style="font-size: 11px; color: #D4A05A; letter-spacing: 0.15em; margin-bottom: 8px; font-weight: 500;">⏰ 健康證提醒</div>
        <div style="font-size: 13px; color: var(--text-secondary); line-height: 1.7;">
          ${healthAlerts.map(e => {
            const diff = Math.ceil((new Date(e.healthExp) - today) / 86400000);
            const status = diff < 0 ? `已過期 ${Math.abs(diff)} 天` : `${diff} 天後到期`;
            return `<strong style="color: var(--text-primary);">${e.name}</strong>（${status}）`;
          }).join('　·　')}
        </div>
      </div>
    ` : ''}
    
    <div class="card">
      <div class="card-head">
        <div>
          <div class="card-title">本月員工薪資預覽</div>
          <div class="card-sub">即時計算 · 隨排班變動</div>
        </div>
        <button class="btn btn-primary" onclick="navigate('payroll')">前往結算 →</button>
      </div>
      ${employees.length === 0 
        ? `<div class="empty"><div class="empty-title">— 尚無員工</div><div class="empty-desc">請先建立員工資料</div><div style="margin-top: 16px;"><button class="btn btn-primary" onclick="navigate('employees')">前往員工資料</button></div></div>`
        : `<table class="data-table">
            <thead><tr>
              <th>員工</th><th>類型</th><th>本月工時</th><th>工作日</th>
              <th>基本薪</th><th>加班費</th><th>伙食金</th><th>應發</th><th>實領</th>
            </tr></thead>
            <tbody>
              ${employees.map(emp => {
                const p = calcMonthlyPayroll(emp, monthKey);
                return `
                  <tr>
                    <td><strong>${emp.name}</strong> <span class="text-mute">${emp.position || ''}</span></td>
                    <td><span class="badge badge-gold">${emp.salaryType || '月薪'}</span></td>
                    <td>${p.hours.total.toFixed(1)} hr</td>
                    <td class="text-mute">${p.hours.workDays}</td>
                    <td class="text-mute">${p.baseSalary.toLocaleString()}</td>
                    <td style="color: ${p.overtime > 0 ? '#D4A05A' : 'var(--text-tertiary)'};">${p.overtime > 0 ? '+' + p.overtime.toLocaleString() : '—'}</td>
                    <td style="color: #8FB89B;">${p.mealCash > 0 ? '+' + p.mealCash : '—'}</td>
                    <td><strong>${p.grossPay.toLocaleString()}</strong></td>
                    <td style="color: var(--accent); font-weight: 500;">${p.netPay.toLocaleString()}</td>
                  </tr>
                `;
              }).join('')}
            </tbody>
          </table>`
      }
    </div>
    
    <div class="card">
      <div class="card-head">
        <div>
          <div class="card-title">店家人事設定</div>
          <div class="card-sub">設定營收目標與成本上限以啟用佔比警示</div>
        </div>
      </div>
      <div class="row row-2">
        <div class="field">
          <label class="field-label">本月目標營收 (NT$)</label>
          <input class="field-input" type="number" id="hrRevenue" value="${STATE.storeSettings.monthlyRevenue || ''}" 
                 placeholder="例：800000" oninput="setStoreSetting('monthlyRevenue', this.value)">
        </div>
        <div class="field">
          <label class="field-label">人事成本上限 (%)</label>
          <input class="field-input" type="number" id="hrCostTarget" value="${STATE.storeSettings.costTarget || 30}" 
                 placeholder="例：30" oninput="setStoreSetting('costTarget', this.value)">
        </div>
      </div>
      <div class="text-mute" style="font-size: 11px; padding-top: 8px;">
        餐飲業常見人事成本佔比：精緻餐飲 25-30% · 一般餐廳 20-25% · 快餐 15-20%
      </div>
    </div>
  `;
}

function setStoreSetting(key, value) {
  if (!STATE.storeSettings) STATE.storeSettings = {};
  STATE.storeSettings[key] = value;
  localStorage.setItem('storeSettings', JSON.stringify(STATE.storeSettings));
  // Don't re-render to avoid losing focus while typing
}

function renderAttendance() {
  const today = new Date();
  const todayStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
  const employees = STATE.employees.filter(e => e.status === '在職');

  const [year, month] = monthKey.split('-').map(Number);
  const daysInMonth = new Date(year, month, 0).getDate();
  
  const monthOptions = [];
  for (let i = -3; i <= 1; i++) {
    const d = new Date(year, month - 1 + i, 1);
    const ym = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
    monthOptions.push({ value: ym, label: `${d.getFullYear()} 年 ${d.getMonth() + 1} 月` });
  }
  
  // 統計：本月各員工打卡次數、遲到次數
  const stats = employees.map(emp => {
    let punchIn = 0, punchOut = 0, late = 0, early = 0;
    Object.keys(STATE.attendance).forEach(k => {
      const rec = STATE.attendance[k];
      if (rec.empId !== emp.id) return;
      if (!rec.date.startsWith(monthKey)) return;
      if (rec.in) punchIn++;
      if (rec.out) punchOut++;
      // Check 遲到 / 早退
      const shiftKey = rec.date + '-' + emp.id;
      const shiftId = STATE.schedule[shiftKey];
      if (shiftId && rec.in) {
        const preset = STATE.shiftPresets.find(p => p.id === shiftId);
        if (preset && preset.startTime) {
          const [sh, sm] = preset.startTime.split(':').map(Number);
          const [ih, im] = rec.in.split(':').map(Number);
          if (ih * 60 + im > sh * 60 + sm + 5) late++; // 5 分鐘緩衝
        }
      }
      if (shiftId && rec.out) {
        const preset = STATE.shiftPresets.find(p => p.id === shiftId);
        if (preset && preset.endTime) {
          const [eh, em] = preset.endTime.split(':').map(Number);
          const [oh, om] = rec.out.split(':').map(Number);
          if (oh * 60 + om < eh * 60 + em - 5) early++;
        }
      }
    });
    return { emp, punchIn, punchOut, late, early };
  });
  
  return `
    <div class="page-head">
      <div class="page-eyebrow">— Attendance</div>
      <h1 class="page-title">打卡<em>記錄</em></h1>

        ${monthOptions.map(o => `<option value="${o.value}" ${o.value === monthKey ? 'selected' : ''}>${o.label}</option>`).join('')}
      </select>
      <div class="actions">
        <button class="btn btn-primary" onclick="openQuickPunch()">⏱ 快速打卡</button>
      </div>
    </div>
    
    <div class="card">
      <div class="card-head">
        <div>
          <div class="card-title">本月打卡統計</div>
          <div class="card-sub">${year} 年 ${month} 月</div>
        </div>
      </div>
      ${employees.length === 0 
        ? `<div class="empty"><div class="empty-title">— 尚無員工</div><div class="empty-desc">請先建立員工資料</div></div>`
        : `<table class="data-table">
            <thead><tr><th>員工</th><th>上班打卡</th><th>下班打卡</th><th>遲到次數</th><th>早退次數</th><th>操作</th></tr></thead>
            <tbody>
              ${stats.map(({emp, punchIn, punchOut, late, early}) => `
                <tr>
                  <td><strong>${emp.name}</strong> <span class="text-mute" style="font-size:11px;">${emp.position || ''}</span></td>
                  <td>${punchIn} 次</td>
                  <td>${punchOut} 次</td>
                  <td style="color: ${late > 0 ? '#D4A05A' : 'var(--text-tertiary)'};">${late > 0 ? late + ' 次' : '—'}</td>
                  <td style="color: ${early > 0 ? '#D4A05A' : 'var(--text-tertiary)'};">${early > 0 ? early + ' 次' : '—'}</td>
                  <td><button class="btn btn-sm" onclick="showAttendanceDetail('${emp.id}', '${monthKey}')">詳細</button></td>
                </tr>
              `).join('')}
            </tbody>
          </table>`
      }
    </div>
    
    <div class="card" style="border-left: 2px solid var(--accent);">
      <div style="font-size: 11px; color: var(--accent); letter-spacing: 0.15em; margin-bottom: 8px;">— 打卡規則</div>
      <div style="font-size: 12px; color: var(--text-secondary); line-height: 1.7;">
        系統會比對排班時間自動判定遲到 / 早退（5 分鐘緩衝）。員工可透過「員工自助查詢」頁面自行打卡，或由店主在此頁手動代打卡。
      </div>
    </div>
  `;
}

  const empId = document.getElementById('punchEmp').value;
  const date = document.getElementById('punchDate').value;
  const time = document.getElementById('punchTime').value;
  if (!empId || !date || !time) { alert('資料不完整'); return; }

  if (!STATE.attendance[key]) STATE.attendance[key] = { empId, date };
  STATE.attendance[key][type] = time;

  const emp = STATE.employees.find(e => e.id === empId);
  
  // 觸發 LINE / Google Sheets webhook
  triggerPunchWebhook(emp, type, date, time, '由店主代打卡');
  
  alert(`✓ ${emp.name} ${type === 'in' ? '上班' : '下班'}打卡成功\n${date} ${time}`);
  closeQuickPunch();

// 統一的打卡 webhook 觸發函式
function triggerPunchWebhook(emp, type, date, time, note) {
  const cfg = STATE.integrations || {};
  if (!cfg.enabled || !cfg.webhookUrl) return;
  
  const events = cfg.notifyEvents || {};
  if (type === 'in' && !events.punchIn) return;
  if (type === 'out' && !events.punchOut) return;
  
  const eventType = type === 'in' ? '上班打卡' : '下班打卡';
  const emoji = type === 'in' ? '⬆️' : '⬇️';
  
  // 檢查遲到 / 早退
  let lateNote = '';
  const shiftId = STATE.schedule[date + '-' + emp.id];
  if (shiftId) {
    const preset = STATE.shiftPresets.find(p => p.id === shiftId);
    if (preset) {
      if (type === 'in' && preset.startTime) {
        const [sh, sm] = preset.startTime.split(':').map(Number);
        const [ih, im] = time.split(':').map(Number);
        const diff = (ih * 60 + im) - (sh * 60 + sm);
        if (diff > 5) lateNote = ` ⚠️ 遲到 ${diff} 分鐘`;
        else if (diff < -5) lateNote = ` ✓ 提早 ${-diff} 分鐘到達`;
      }
      if (type === 'out' && preset.endTime) {
        const [eh, em] = preset.endTime.split(':').map(Number);
        const [oh, om] = time.split(':').map(Number);
        const diff = (oh * 60 + om) - (eh * 60 + em);
        if (diff < -5) lateNote = ` ⚠️ 早退 ${-diff} 分鐘`;
        else if (diff > 0) lateNote = ` ⏱ 加班 ${diff} 分鐘`;
      }
    }
  }
  
  const message = `${emoji} ${eventType}\n👤 ${emp.name}（${emp.position || '員工'}）\n📅 ${date} ${time}${lateNote}${note ? '\n📝 ' + note : ''}`;
  
  sendWebhook({
    eventType: eventType,
    empName: emp.name,
    date: date,
    time: time,
    message: message,
    note: (note || '') + lateNote,
  }).catch(err => console.warn('Webhook 通知失敗（不影響打卡記錄）:', err));
}

function showAttendanceDetail(empId, monthKey) {

  for (let d = 1; d <= daysInMonth; d++) {

    const key = dateStr + '_' + empId;
    const rec = STATE.attendance[key];
    const dt = new Date(year, month - 1, d);
    const weekday = ['日','一','二','三','四','五','六'][dt.getDay()];
    const shiftKey = dateStr + '-' + empId;
    const shiftId = STATE.schedule[shiftKey];
    const preset = shiftId ? STATE.shiftPresets.find(p => p.id === shiftId) : null;
    const holiday = isHoliday(dateStr);
    
    if (!rec && !preset && !holiday) continue; // 略過無事項的日子
    
    rows += `
      <tr ${holiday ? 'style="background: rgba(196, 90, 77, 0.05);"' : ''}>

        <td class="text-mute" style="font-size: 11px;">${preset ? preset.name + ' ' + preset.startTime + '-' + preset.endTime : '—'}</td>
        <td>${rec?.in || '<span class="text-mute">—</span>'}</td>
        <td>${rec?.out || '<span class="text-mute">—</span>'}</td>
        <td>${rec?.in && rec?.out ? (() => {
          const [ih, im] = rec.in.split(':').map(Number);
          const [oh, om] = rec.out.split(':').map(Number);
          let mins = (oh * 60 + om) - (ih * 60 + im);
          if (mins < 0) mins += 24 * 60;
          return (mins / 60).toFixed(1) + ' h';
        })() : '<span class="text-mute">—</span>'}</td>
      </tr>
    `;
  }
  
  if (!rows) rows = '<tr><td colspan="5" class="text-mute" style="text-align: center; padding: 24px;">本月無打卡記錄</td></tr>';
  
  const html = `
    <div class="modal-backdrop" id="attDetail" onclick="if(event.target===this) document.getElementById('attDetail').remove()">
      <div class="modal" style="max-width: 720px;">
        <div class="modal-head">
          <div>
            <div class="card-title">${emp.name} · ${year}/${String(month).padStart(2,'0')} 打卡明細</div>
            <div class="card-sub">${emp.position || ''}</div>
          </div>
          <button class="modal-close" onclick="document.getElementById('attDetail').remove()">×</button>
        </div>
        <div class="modal-body">
          <table class="data-table">
            <thead><tr><th>日期</th><th>排班</th><th>上班打卡</th><th>下班打卡</th><th>實際工時</th></tr></thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
      </div>
    </div>
  `;
  
  const div = document.createElement('div');
  div.innerHTML = html;
  document.body.appendChild(div.firstElementChild);
}

// ============================================================
// 勞基法第 38 條 — 特別休假自動計算
// ============================================================
// 年資與特休天數對照表
const ANNUAL_LEAVE_TABLE = [
  { minMonths: 6, maxMonths: 12, days: 3 },     // 6 個月以上未滿 1 年
  { minYears: 1, maxYears: 2, days: 7 },         // 1 年以上未滿 2 年
  { minYears: 2, maxYears: 3, days: 10 },        // 2 年以上未滿 3 年
  { minYears: 3, maxYears: 5, days: 14 },        // 3 年以上未滿 5 年
  { minYears: 5, maxYears: 10, days: 15 },       // 5 年以上未滿 10 年
  // 10 年以上每年 +1 日，至 30 日為止
];

// 計算員工到某個日期的法定應有特休天數（年資制）
function calcEntitledAnnualLeave(emp, asOfDate) {
  if (!emp.startDate) return 0;
  const start = new Date(emp.startDate);
  const target = asOfDate ? new Date(asOfDate) : new Date();
  
  const monthsDiff = (target.getFullYear() - start.getFullYear()) * 12 
                   + (target.getMonth() - start.getMonth());
  
  // 不滿 6 個月
  if (monthsDiff < 6) return 0;
  
  const years = monthsDiff / 12;
  
  if (years < 1) return 3;
  if (years < 2) return 7;
  if (years < 3) return 10;
  if (years < 5) return 14;
  if (years < 10) return 15;
  // 10 年以上，每年加 1 日，最多 30 日
  return Math.min(30, 15 + Math.floor(years - 9));
}

// 取得員工某個年度（特休週期）的特休統計
function getAnnualLeaveStatus(emp, year) {
  // 預設特休週期 = 到職日週年制；公司也可設定為曆年制
  const cycleType = STATE.storeSettings.leaveCycle || 'anniversary'; // 'anniversary' or 'calendar'
  
  let cycleStart, cycleEnd, cycleLabel;
  
  if (cycleType === 'calendar') {
    // 曆年制：1/1 ~ 12/31
    const yr = year || new Date().getFullYear();
    cycleStart = new Date(yr, 0, 1);
    cycleEnd = new Date(yr, 11, 31);
    cycleLabel = yr + ' 年';
  } else {
    // 週年制：依到職日
    if (!emp.startDate) {
      const yr = year || new Date().getFullYear();
      cycleStart = new Date(yr, 0, 1);
      cycleEnd = new Date(yr, 11, 31);
      cycleLabel = yr + ' 年';
    } else {
      const start = new Date(emp.startDate);
      const targetYear = year || new Date().getFullYear();
      cycleStart = new Date(targetYear, start.getMonth(), start.getDate());
      cycleEnd = new Date(targetYear + 1, start.getMonth(), start.getDate());
      cycleEnd.setDate(cycleEnd.getDate() - 1);
      cycleLabel = `${targetYear}/${start.getMonth() + 1}/${start.getDate()} ~ ${cycleEnd.getFullYear()}/${cycleEnd.getMonth() + 1}/${cycleEnd.getDate()}`;
    }
  }
  
  // 法定應有天數（以週期開始日的年資計算）
  const entitled = calcEntitledAnnualLeave(emp, cycleStart);
  
  // 計算此週期內已使用的特休
  const cycleStartStr = cycleStart.toISOString().slice(0, 10);
  const cycleEndStr = cycleEnd.toISOString().slice(0, 10);
  
  const used = STATE.leaves
    .filter(l => l.empId === emp.id && l.type === '特休' && l.status === 'approved'
              && l.startDate >= cycleStartStr && l.startDate <= cycleEndStr)
    .reduce((sum, l) => sum + (parseFloat(l.days) || 0), 0);
  
  // 計算此週期內已折現
  const cashedOut = (emp.leaveHistory || [])
    .filter(h => h.cycleYear == year && h.action === 'cashout')
    .reduce((sum, h) => sum + (parseFloat(h.days) || 0), 0);
  
  // 計算遞延（從上一年帶過來的）
  const carriedOver = (emp.leaveHistory || [])
    .filter(h => h.cycleYear == year && h.action === 'carryover_in')
    .reduce((sum, h) => sum + (parseFloat(h.days) || 0), 0);
  
  // 加上手動補登的調整（覆蓋計算）— 用於補建年資前的歷史
  const manualAdjust = (emp.leaveHistory || [])
    .filter(h => h.cycleYear == year && h.action === 'manual_adjust')
    .reduce((sum, h) => sum + (parseFloat(h.days) || 0), 0);
  
  const totalEntitled = entitled + carriedOver + manualAdjust;
  const remaining = totalEntitled - used - cashedOut;
  
  return {
    cycleLabel, cycleStart, cycleEnd, year,
    entitled, carriedOver, manualAdjust, totalEntitled,
    used, cashedOut, remaining,
  };
}

function autoCalcLeaveDays() {
  const start = document.getElementById('lStart').value;
  const end = document.getElementById('lEnd').value;
  if (!start || !end) return;
  const sd = new Date(start);
  const ed = new Date(end);
  const diff = Math.round((ed - sd) / 86400000) + 1;
  if (diff > 0) document.getElementById('lDays').value = diff;
}

function saveLeave(status) {
  const data = {
    id: uid(),
    empId: document.getElementById('lEmp').value,
    type: document.getElementById('lType').value,
    startDate: document.getElementById('lStart').value,
    endDate: document.getElementById('lEnd').value,
    days: document.getElementById('lDays').value,
    reason: document.getElementById('lReason').value.trim(),
    status: status || 'approved',
    createdAt: new Date().toISOString(),
  };
  if (!data.startDate || !data.endDate || !data.days) { alert('請填寫日期與天數'); return; }
  save('leaves', [...STATE.leaves, data]);
  
  // 觸發請假通知 webhook
  const cfg = STATE.integrations || {};
  if (cfg.enabled && cfg.webhookUrl && cfg.notifyEvents?.leaveRequest) {
    const emp = STATE.employees.find(e => e.id === data.empId);
    if (emp) {
      const message = `📋 ${data.status === 'pending' ? '待審請假' : '請假登記'}\n👤 ${emp.name}（${emp.position || '員工'}）\n🏷 ${data.type}\n📅 ${data.startDate} ~ ${data.endDate}（${data.days} 天）\n📝 ${data.reason || '無原因'}`;
      sendWebhook({
        eventType: '請假申請',
        empName: emp.name,
        date: data.startDate,
        time: data.endDate,
        message: message,
        note: `${data.type} ${data.days} 天 — ${data.reason || ''}`,
      }).catch(err => console.warn('請假通知失敗:', err));
    }
  }
  
  render();
}

function approveLeave(id) {
  save('leaves', STATE.leaves.map(l => l.id === id ? {...l, status: 'approved'} : l));
  render();
}

function deleteLeave(id) {
  if (!confirm('確定刪除此請假記錄？')) return;
  save('leaves', STATE.leaves.filter(l => l.id !== id));
  render();
}

function saveHistoryRecord(empId, action) {
  const year = parseInt(document.getElementById('hYear').value);
  let days = parseFloat(document.getElementById('hDays').value);
  const amount = document.getElementById('hAmount')?.value || '';
  const note = document.getElementById('hNote').value.trim();
  
  if (!year || isNaN(days)) { alert('請填入年度和天數'); return; }
  
  // For 'used_history', store as negative (subtract from totalEntitled via manual_adjust pattern)
  // Actually we treat it differently: it doesn't reduce entitled, it adds to "used" count
  // But to keep things simple, used_history is stored as a manual_adjust (negative days)
  const storedAction = action === 'used_history' ? 'manual_adjust' : action;
  const storedDays = action === 'used_history' ? -Math.abs(days) : days;
  
  const record = {
    id: uid(),
    cycleYear: year,
    action: storedAction,
    days: storedDays,
    amount: amount,
    note: action === 'used_history' ? `[已休歷史] ${note}` : note,
    createdAt: new Date().toISOString(),
  };
  
  const updated = STATE.employees.map(e => {
    if (e.id !== empId) return e;
    return {...e, leaveHistory: [...(e.leaveHistory || []), record]};
  });
  save('employees', updated);
  
  // Close and reopen the history modal to refresh
  const m = document.getElementById('leaveHistory');
  if (m) m.remove();
  showLeaveHistory(empId);
}

function deleteHistoryRecord(empId, recordId) {
  if (!confirm('確定刪除此補登紀錄？')) return;
  const updated = STATE.employees.map(e => {
    if (e.id !== empId) return e;
    return {...e, leaveHistory: (e.leaveHistory || []).filter(h => h.id !== recordId)};
  });
  save('employees', updated);
  const m = document.getElementById('leaveHistory');
  if (m) m.remove();
  showLeaveHistory(empId);
}

// ============================================================
// GPS — 定位打卡相關函式
// ============================================================

// 計算兩點間距離（公尺，使用 Haversine 公式）
function calcDistance(lat1, lng1, lat2, lng2) {
  const R = 6371000; // 地球半徑（公尺）
  const toRad = deg => deg * Math.PI / 180;
  
  const dLat = toRad(lat2 - lat1);
  const dLng = toRad(lng2 - lng1);
  const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
            Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) *
            Math.sin(dLng/2) * Math.sin(dLng/2);
  const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  return R * c;
}

// 取得目前 GPS 位置（Promise 包裝）
function getCurrentPosition() {
  return new Promise((resolve, reject) => {
    if (!navigator.geolocation) {
      reject(new Error('此瀏覽器不支援 GPS 定位'));
      return;
    }
    navigator.geolocation.getCurrentPosition(
      pos => resolve({
        lat: pos.coords.latitude,
        lng: pos.coords.longitude,
        accuracy: pos.coords.accuracy,
      }),
      err => {
        let msg = '無法取得位置';
        if (err.code === 1) msg = '❌ GPS 權限被拒絕\n\n請在瀏覽器設定中允許此網站存取位置權限，然後重新整理頁面。';
        else if (err.code === 2) msg = '❌ 目前無法定位\n\n請檢查：\n1. 手機 GPS 是否開啟\n2. 網路連線是否正常\n3. 室內 GPS 訊號可能不穩，移到窗邊試試';
        else if (err.code === 3) msg = '❌ 定位逾時\n\n請確認 GPS 訊號正常後重試';
        reject(new Error(msg));
      },
      { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
    );
  });
}

// 在設定頁，擷取店家目前位置

  try {

    document.getElementById('storeLng').value = pos.lng.toFixed(7);
    
    result.innerHTML = `
      <div style="background: rgba(143, 184, 155, 0.1); padding: 12px 16px; border-radius: 4px; color: #8FB89B; border-left: 2px solid #8FB89B; font-size: 12px;">

        <span style="font-size: 11px;">緯度: ${pos.lat.toFixed(7)}, 經度: ${pos.lng.toFixed(7)}<br>
        GPS 精度: ±${Math.round(pos.accuracy)} 公尺<br>
        ${pos.accuracy > 30 ? '⚠️ GPS 精度較差，建議到戶外或窗邊重新擷取' : ''}<br>
        記得按「儲存設定」</span>
      </div>
    `;

    result.innerHTML = `
      <div style="background: rgba(196, 90, 77, 0.1); padding: 12px 16px; border-radius: 4px; color: #C45A4D; border-left: 2px solid #C45A4D; font-size: 12px; white-space: pre-wrap;">

}

// 儲存 GPS 設定
function saveGpsSettings() {
  const lat = parseFloat(document.getElementById('storeLat').value);
  const lng = parseFloat(document.getElementById('storeLng').value);
  const radius = parseInt(document.getElementById('gpsRadius').value) || 20;
  
  if (isNaN(lat) || isNaN(lng)) {
    alert('請填入有效的經緯度，或點「擷取目前位置」自動填入');
    return;
  }
  
  setStoreSetting('storeLat', lat);
  setStoreSetting('storeLng', lng);
  setStoreSetting('gpsRadius', radius);
  alert(`✓ GPS 設定已儲存\n緯度: ${lat}\n經度: ${lng}\n半徑: ${radius} 公尺`);
  render();
}

// 員工自助打卡時：驗證 GPS 位置
async function verifyGpsForPunch() {
  // 如果未啟用 GPS 打卡，直接通過
  if (!STATE.storeSettings.gpsEnabled) return { ok: true, distance: null };
  
  // 確認店家位置已設定
  const storeLat = parseFloat(STATE.storeSettings.storeLat);
  const storeLng = parseFloat(STATE.storeSettings.storeLng);
  if (isNaN(storeLat) || isNaN(storeLng)) {
    return { 
      ok: false, 
      reason: '⚠️ 店家未設定 GPS 位置，請聯絡店主完成設定' 
    };
  }
  
  const radius = parseInt(STATE.storeSettings.gpsRadius) || 20;
  
  try {
    const pos = await getCurrentPosition();
    const distance = calcDistance(pos.lat, pos.lng, storeLat, storeLng);
    
    if (distance > radius) {
      return {
        ok: false,
        distance: distance,
        accuracy: pos.accuracy,
        reason: `❌ 您距離店家 ${Math.round(distance)} 公尺，超出允許範圍 ${radius} 公尺\n\n請到店裡再打卡，或請主管手動代打卡。\n\n（GPS 精度: ±${Math.round(pos.accuracy)} 公尺）`,
      };
    }
    
    return {
      ok: true,
      distance: distance,
      accuracy: pos.accuracy,
    };
  } catch (err) {
    return {
      ok: false,
      reason: err.message,
    };
  }
}

  // If not logged in, show PIN entry
  if (!STATE.selfServiceEmpId) {
    return renderSelfServiceLogin();
  }
  
  const emp = STATE.employees.find(e => e.id === STATE.selfServiceEmpId);
  if (!emp) {
    STATE.selfServiceEmpId = null;
    return renderSelfServiceLogin();
  }
  
  return renderSelfServiceDashboard(emp);
}

function doSelfServiceLogin() {
  const empId = document.getElementById('ssName').value;
  const pin = document.getElementById('ssPin').value;
  if (!empId) { alert('請選擇員工'); return; }
  if (!pin) { alert('請輸入 PIN 碼'); return; }
  
  const emp = STATE.employees.find(e => e.id === empId);
  if (!emp) { alert('員工資料錯誤'); return; }
  
  // Default PIN = last 4 of ID, or emp.pin if set
  const expectedPin = emp.pin || (emp.idNum ? emp.idNum.slice(-4) : '');
  if (!expectedPin) {
    if (confirm(`員工「${emp.name}」尚未設定 PIN 也未填身分證字號。是否將「${pin}」設為其 PIN？`)) {
      const updated = STATE.employees.map(e => e.id === empId ? {...e, pin} : e);
      save('employees', updated);
      STATE.selfServiceEmpId = empId;
      render();
      return;
    }
    return;
  }
  
  if (pin !== expectedPin) {
    alert('PIN 碼錯誤');
    return;
  }
  
  STATE.selfServiceEmpId = empId;
  render();
}

function selfServiceLogout() {
  STATE.selfServiceEmpId = null;
  render();
}

async function selfPunch(type) {
  const today = new Date();
  const todayStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
  const nowTime = `${String(today.getHours()).padStart(2,'0')}:${String(today.getMinutes()).padStart(2,'0')}`;
  
  // 找到打卡按鈕做 loading 狀態
  const buttons = document.querySelectorAll('button');
  let loadingBtn = null;
  buttons.forEach(b => {
    if (b.textContent.includes(type === 'in' ? '上班' : '下班') && !b.disabled) {
      loadingBtn = b;
    }
  });
  
  // GPS 驗證（如已啟用）
  if (STATE.storeSettings.gpsEnabled) {
    if (loadingBtn) {
      loadingBtn.disabled = true;
      loadingBtn.textContent = '📍 定位中...';
    }
    
    const result = await verifyGpsForPunch();
    
    if (loadingBtn) loadingBtn.disabled = false;
    
    if (!result.ok) {
      alert(result.reason);
      render();
      return;
    }
    
    // GPS 驗證通過，記錄距離
    const empId = STATE.selfServiceEmpId;
    const key = todayStr + '_' + empId;
    if (!STATE.attendance[key]) STATE.attendance[key] = { empId, date: todayStr };
    STATE.attendance[key][type] = nowTime;
    STATE.attendance[key][type + 'Distance'] = Math.round(result.distance);
    STATE.attendance[key][type + 'Accuracy'] = Math.round(result.accuracy);
    localStorage.setItem('attendance', JSON.stringify(STATE.attendance));
    
    const emp = STATE.employees.find(e => e.id === empId);
    if (emp) {
      const note = `員工自助打卡 · 距離 ${Math.round(result.distance)}m`;
      triggerPunchWebhook(emp, type, todayStr, nowTime, note);
    }
    
    alert(`✓ ${type === 'in' ? '上班' : '下班'}打卡成功 ${nowTime}\n📍 距離店家 ${Math.round(result.distance)} 公尺`);
  } else {
    // 未啟用 GPS，正常打卡
    const empId = STATE.selfServiceEmpId;
    const key = todayStr + '_' + empId;
    if (!STATE.attendance[key]) STATE.attendance[key] = { empId, date: todayStr };
    STATE.attendance[key][type] = nowTime;
    localStorage.setItem('attendance', JSON.stringify(STATE.attendance));
    
    const emp = STATE.employees.find(e => e.id === empId);
    if (emp) {
      triggerPunchWebhook(emp, type, todayStr, nowTime, '員工自助打卡');
    }
    
    alert(`✓ ${type === 'in' ? '上班' : '下班'}打卡成功 ${nowTime}`);
  }
  
  render();
}

function changeSelfPin() {
  const p1 = document.getElementById('newPinSelf').value;
  const p2 = document.getElementById('newPinSelf2').value;
  if (!p1 || p1.length !== 4) { alert('PIN 必須為 4 位數'); return; }
  if (p1 !== p2) { alert('兩次輸入不一致'); return; }
  
  const updated = STATE.employees.map(e => 
    e.id === STATE.selfServiceEmpId ? {...e, pin: p1} : e
  );
  save('employees', updated);
  alert('PIN 已變更');
  render();
}

// 在最上方填入您的 LINE Bot 設定
const LINE_CHANNEL_TOKEN = '在此貼上 Channel Access Token';
const LINE_USER_ID = '在此貼上 Your User ID';

function doPost(e) {
  try {
    const data = JSON.parse(e.postData.contents);
    
    // 1. 寫入 Google Sheets
    const sheet = SpreadsheetApp.getActiveSpreadsheet().getActiveSheet();
    const timestamp = new Date();
    sheet.appendRow([
      timestamp,
      data.empName || '',
      data.eventType || '',
      data.date || '',
      data.time || '',
      data.note || ''
    ]);
    
    // 2. 推送 LINE 通知
    if (LINE_CHANNEL_TOKEN && LINE_USER_ID && data.message) {
      sendLineMessage(data.message);
    }
    
    return ContentService.createTextOutput(JSON.stringify({
      success: true,
      timestamp: timestamp.toISOString()
    })).setMimeType(ContentService.MimeType.JSON);
    
  } catch (err) {
    return ContentService.createTextOutput(JSON.stringify({
      success: false,
      error: err.toString()
    })).setMimeType(ContentService.MimeType.JSON);
  }
}

function sendLineMessage(message) {
  const url = 'https://api.line.me/v2/bot/message/push';
  const payload = {
    to: LINE_USER_ID,
    messages: [{ type: 'text', text: message }]
  };
  
  UrlFetchApp.fetch(url, {
    method: 'post',
    headers: {
      'Authorization': 'Bearer ' + LINE_CHANNEL_TOKEN,
      'Content-Type': 'application/json'
    },
    payload: JSON.stringify(payload),
    muteHttpExceptions: true
  });
}

// === Webhook 核心發送函式 ===
// 這是其他地方（如打卡）會呼叫的核心函式
async function sendWebhook(payload) {
  const cfg = STATE.integrations || {};
  if (!cfg.enabled || !cfg.webhookUrl) {
    return { skipped: true };
  }
  
  // 因為 Google Apps Script 的 CORS 政策，我們用 no-cors 發送
  // 雖然無法讀取回應，但訊息確實會送達
  try {
    await fetch(cfg.webhookUrl, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify(payload),
    });
    return { success: true };
  } catch (err) {
    console.error('Webhook 發送失敗:', err);
    throw err;
  }
}

  }).catch(() => {

  });
}

function renderSchedule() {
  const employees = STATE.employees.filter(e => e.status === '在職');
  const monthKey = getCurrentScheduleMonth();
  const [year, month] = monthKey.split('-').map(Number);
  const daysInMonth = new Date(year, month, 0).getDate();
  
  // Month options
  const monthOptions = [];
  for (let i = -3; i <= 3; i++) {
    const d = new Date(year, month - 1 + i, 1);
    const ym = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
    monthOptions.push({ value: ym, label: `${d.getFullYear()} 年 ${d.getMonth() + 1} 月` });
  }
  
  if (employees.length === 0) {
    return `
      <div class="page-head">
        <div class="page-eyebrow">— Schedule</div>
        <h1 class="page-title">員工<em>排班表</em></h1>
        <div class="page-divider"></div>
      </div>

  }
  
  // 計算本月人事成本
  let totalCost = 0;
  employees.forEach(emp => {
    const p = calcMonthlyPayroll(emp, monthKey);
    totalCost += p.grossPay;
  });
  const targetRevenue = parseFloat(STATE.storeSettings.monthlyRevenue) || 0;
  const costRatio = targetRevenue > 0 ? (totalCost / targetRevenue * 100) : 0;
  const costTarget = parseFloat(STATE.storeSettings.costTarget) || 30;
  const overBudget = costRatio > costTarget;
  
  // Build weeks
  const weeks = [];
  for (let i = 0; i < daysInMonth; i += 7) {
    weeks.push(Array.from({length: Math.min(7, daysInMonth - i)}, (_, j) => i + j + 1));
  }
  
  return `

function setShift(scheduleKey, shiftId) {
  const newSchedule = { ...STATE.schedule };
  if (!shiftId) {
    delete newSchedule[scheduleKey];
  } else {
    newSchedule[scheduleKey] = shiftId;
  }
  save('schedule', newSchedule);
  closeShiftPicker();
  render();
}

function quickFillDefaults(monthKey) {
  if (!confirm('將每位員工每天套用其「常用班別」（已有排班的不會覆蓋，未設常用班別的員工會被跳過）。確定？')) return;
  const employees = STATE.employees.filter(e => e.status === '在職' && e.defaultShift);
  const [yr, mo] = monthKey.split('-').map(Number);
  const daysInMonth = new Date(yr, mo, 0).getDate();
  const newSchedule = { ...STATE.schedule };
  let count = 0;
  employees.forEach(emp => {
    for (let d = 1; d <= daysInMonth; d++) {
      const key = getDayKey(monthKey, d) + '-' + emp.id;
      if (!newSchedule[key]) {
        newSchedule[key] = emp.defaultShift;
        count++;
      }
    }
  });
  save('schedule', newSchedule);
  alert(`已套用 ${count} 個排班（共 ${employees.length} 位有設定常用班別的員工）`);
  render();
}

function clearMonthSchedule(monthKey) {
  if (!confirm('確定清空本月所有排班記錄？此操作無法復原。')) return;
  const newSchedule = {...STATE.schedule};
  Object.keys(newSchedule).forEach(k => {
    if (k.startsWith(monthKey)) delete newSchedule[k];
  });
  save('schedule', newSchedule);
  render();
}

function clauseField(key, label, hint, isMultiline) {
  const isEdited = STATE.contractClauses && STATE.contractClauses[key] !== undefined;
  const currentValue = getClause(key);
  const safeValue = currentValue.replace(/"/g, '&quot;').replace(/</g, '&lt;');
  
  return `
    <div class="clause-field" data-edited="${isEdited}">
      <div class="clause-field-head">
        <label class="clause-field-label">${label}${isEdited ? ' <span class="edited-tag">已編輯</span>' : ''}</label>
        ${isEdited ? `<button class="btn-link" onclick="resetSingleClause('${key}')">⟲ 還原此項</button>` : ''}
      </div>
      ${hint ? `<div class="clause-field-hint">${hint}</div>` : ''}
      ${isMultiline 
        ? `<textarea class="clause-textarea" rows="${Math.max(3, currentValue.split('\\n').length + 1)}"
            oninput="setClause('${key}', this.value); markEdited(this)">${safeValue}</textarea>`
        : `<input type="text" class="clause-input"
            value="${safeValue}"
            oninput="setClause('${key}', this.value); markEdited(this)">`
      }
    </div>
  `;
}

function resetSingleClause(key) {
  if (!confirm('確定要還原這一項為預設內容？您對此項的編輯會消失。')) return;
  resetClause(key);
  render();
}

function markEdited(el) {
  // Live indicator (debounce-friendly): just add a class for visual feedback
  el.style.borderColor = '#C9A84C';
  el.style.background = 'rgba(201, 168, 76, 0.05)';
}

        </div>
      ` : `
        <div style="background: var(--bg-tertiary); padding: 16px; border-radius: 4px; margin-bottom: 16px; font-size: 12px; color: var(--text-secondary); border-left: 2px solid var(--accent); line-height: 1.7;">

        </div>
        <div class="field">
          <label class="field-label">設定密碼 (建議至少 6 字元)</label>
          <input class="field-input" type="password" id="newPw1" placeholder="輸入新密碼">
        </div>
        <div class="field">
          <label class="field-label">再次確認密碼</label>
          <input class="field-input" type="password" id="newPw2" 
                 placeholder="再次輸入密碼"
                 onkeypress="if(event.key==='Enter') setOwnerPassword()">
        </div>
        <div class="actions">

        </div>
      `}
    </div>
  `;
}

function setOwnerPassword() {
  const p1 = document.getElementById('newPw1').value;
  const p2 = document.getElementById('newPw2').value;
  if (!p1 || p1.length < 4) { alert('密碼至少 4 字元'); return; }
  if (p1 !== p2) { alert('兩次輸入的密碼不相符'); return; }
  STATE.ownerPassword = p1;
  STATE.isOwnerUnlocked = true;
  localStorage.setItem('ownerPassword', p1);
  alert('密碼設定成功');
  render();
}

function unlockOwner() {
  const input = document.getElementById('ownerPwInput').value;
  if (input === STATE.ownerPassword) {
    STATE.isOwnerUnlocked = true;
    render();
  } else {
    alert('密碼錯誤');
    document.getElementById('ownerPwInput').value = '';
    document.getElementById('ownerPwInput').focus();
  }
}

function lockOwner() {
  STATE.isOwnerUnlocked = false;
  STATE.currentPage = 'dashboard';
  render();
}

function resetOwnerPassword() {
  if (!confirm('警告：重設密碼會清除目前的密碼設定，確定繼續？')) return;
  STATE.ownerPassword = null;
  STATE.isOwnerUnlocked = false;
  localStorage.removeItem('ownerPassword');
  render();
}

  STATE.currentSubPage = 'contract-' + type;
  render();
  setTimeout(() => {
    const area = document.querySelector('.main');
    area.innerHTML = renderContractForm(type);
